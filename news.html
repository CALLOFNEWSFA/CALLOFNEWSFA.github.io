<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اخبار کالاف دیوتی موبایل</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght=700;900&family=Vazirmatn:wght=400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Vazirmatn', sans-serif; }
        body { background-color: #0b0b0e; color: #eeeeee; background-image: radial-gradient(circle at 50% 20%, #1f1414 0%, #0b0b0e 60%); }
        
        header { 
            position: fixed; top: 0; left: 0; width: 100%; padding: 20px 6%; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 1000; background: rgba(11, 11, 14, 0.85); backdrop-filter: blur(12px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.03); 
        }
        
        .logo { font-size: 26px; font-weight: 900; color: #ffffff; letter-spacing: 0.5px; }
        .logo span { color: #ff1a1a; text-shadow: 0 0 15px rgba(255, 26, 26, 0.8); }
        
        .btn-back {
            padding: 8px 20px; background: transparent; color: #ff1a1a; border: 2px solid #ff1a1a;
            font-family: 'Orbitron', sans-serif; font-weight: 700; border-radius: 4px;
            cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px;
            text-decoration: none; font-size: 14px;
        }
        .btn-back:hover { background-color: #ff1a1a; color: #fff; box-shadow: 0 0 15px #ff1a1a; }

        .container { max-width: 800px; margin: 0 auto; padding: 160px 4% 80px 4%; }
        .main-title { text-align: center; font-size: 26px; font-weight: 700; margin-bottom: 12px; color: #ffffff; }
        .subtitle { text-align: center; color: #ff1a1a; font-size: 15px; margin-bottom: 50px; font-weight: bold; }
        
        .loading { text-align: center; font-size: 18px; color: #ff1a1a; margin: 40px 0; font-weight: bold; }
        .news-feed { display: flex; flex-direction: column; gap: 40px; }
        .news-card { background: #121216; border: 1px solid #1e1e24; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .news-image { width: 100%; height: 320px; object-fit: cover; border-bottom: 1px solid #1e1e24; background-color: #121216; }
        .news-content { padding: 30px; }
        .news-meta { display: flex; justify-content: space-between; font-size: 13px; color: #ff1a1a; font-weight: bold; margin-bottom: 15px; }
        
        .news-card h3 { font-size: 20px; color: #ffffff; margin-bottom: 15px; line-height: 1.6; text-align: left; font-family: 'Roboto', sans-serif; }
        .news-card p { color: #b3b9c1; font-size: 14px; line-height: 1.8; text-align: left; font-family: 'Roboto', sans-serif; margin-bottom: 20px; }
        
        .translate-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 20px; background: #1e1e24; color: #ffffff; border: 1px solid #ff1a1a;
            border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold;
            transition: all 0.3s; direction: rtl;
        }
        .translate-btn:hover { background: #ff1a1a; box-shadow: 0 0 15px rgba(255, 26, 26, 0.4); }
        
        .translated-box {
            margin-top: 15px; padding: 15px; background: rgba(255, 26, 26, 0.05);
            border-right: 3px solid #ff1a1a; border-radius: 4px; display: none;
            color: #eeeeee; font-size: 14px; line-height: 1.8; text-align: right;
        }

        @media(max-width: 768px) {
            .logo { font-size: 22px; }
            .btn-back { padding: 6px 14px; font-size: 12px; }
            .main-title { font-size: 22px; }
            .news-image { height: 200px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">کالاف <span>نیوز</span></div>
        <a href="index.html" class="btn-back">Back</a>
    </header>

    <div class="container">
        <h1 class="main-title">اخبار کالاف دیوتی موبایل</h1>
        <p class="subtitle">اخبار دقیق و به روز</p>

        <div id="loading" class="loading">⚡ در حال دریافت خودکار آخرین اخبار زنده...</div>
        <div class="news-feed" id="newsWrapper"></div>
    </div>

    <script>
        // تغییر منبع به یک فید خبری بزرگتر و پایدارتر گیمینگ
        const liveNewsApi = "https://api.rss2json.com/v1/api.json?rss_url=https://www.polygon.com/rss/index.xml&api_key=4n8b8v8v8v8v8v8v8v8v8v8v8v8v8v8v"; 
        
        // پوستر رزرو و بسیار باکیفیت کالاف دیوتی برای خبرهایی که عکس ندارند
        const defaultCodImg = "https://s8.uupload.ir/files/codm1_7m7x.jpg";

        async function loadLiveNews() {
            const wrapper = document.getElementById('newsWrapper');
            const loading = document.getElementById('loading');

            try {
                // دریافت دیتای عمومی بازی‌ها
                const response = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://www.gameinformer.com/news.xml").catch(() => null) 
                                 || await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://www.gamespot.com/feeds/news/");
                
                const data = await response.json();
                
                // فیلتر هوشمند برای پیدا کردن اخبار مربوط به کالاف دیوتی و شوترها
                let codNews = data.items.filter(item => 
                    item.title.toLowerCase().includes('duty') || 
                    item.title.toLowerCase().includes('cod') ||
                    item.title.toLowerCase().includes('warzone') ||
                    item.description.toLowerCase().includes('call of duty')
                );

                // اگر در آن لحظه خبر جدیدی از کالاف نبود، برای خالی نماندن صفحه، اخبار داغ شوتر/موبایل را بیاور
                if (codNews.length === 0) {
                    codNews = data.items.slice(0, 5); 
                }

                if (codNews && codNews.length > 0) {
                    loading.style.display = 'none';
                    wrapper.innerHTML = '';

                    codNews.forEach((item, index) => {
                        // حل مشکل عکس: اگر دیتای عکس خراب بود یا وجود نداشت، پوستر اصلی کالاف دیوتی ست می‌شود
                        let imgUrl = item.enclosure?.link || item.thumbnail || defaultCodImg;
                        if(imgUrl.includes("ytimg") || !imgUrl.startsWith("http")) {
                            imgUrl = defaultCodImg;
                        }
                        
                        let cleanDesc = item.description.replace(/<[^>]*>/g, '').substring(0, 220) + '...';

                        const card = document.createElement('div');
                        card.className = 'news-card';
                        card.innerHTML = `
                            <img src="${imgUrl}" class="news-image" onerror="this.src='${defaultCodImg}'" alt="CODM News">
                            <div class="news-content">
                                <div class="news-meta">
                                    <span>CALL OF DUTY 🔴</span>
                                    <span>LIVE UPDATE</span>
                                </div>
                                <h3 id="title-${index}">${item.title}</h3>
                                <p id="desc-${index}">${cleanDesc}</p>
                                
                                <button class="translate-btn" onclick="translateNews(${index})">ترجمه به فارسی 🔄</button>
                                <div class="translated-box" id="trans-box-${index}">در حال ترجمه هوشمند...</div>
                            </div>
                        `;
                        wrapper.appendChild(card);
                    });
                } else {
                    showFallbackDemo();
                }
            } catch (error) {
                showFallbackDemo();
            }
        }

        async function translateNews(index) {
            const transBox = document.getElementById(`trans-box-${index}`);
            const titleText = document.getElementById(`title-${index}`).innerText;
            const descText = document.getElementById(`desc-${index}`).innerText;
            
            if (transBox.style.display === "block") {
                transBox.style.display = "none";
                return;
            }

            transBox.style.display = "block";
            transBox.innerText = "⏳ در حال ترجمه خودکار متن... لطفاً چند لحظه صبر کنید.";

            try {
                const textToTranslate = `${titleText} . ${descText}`;
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=fa&dt=t&q=${encodeURIComponent(textToTranslate)}`);
                const result = await res.json();
                
                let translatedText = "";
                result[0].forEach(sentence => {
                    if(sentence[0]) translatedText += sentence[0];
                });

                transBox.innerHTML = `<strong>ترجمه فارسی:</strong><br>${translatedText}`;
            } catch (error) {
                transBox.innerText = "❌ خطا در سرور ترجمه. دوباره تلاش کنید.";
            }
        }

        function showFallbackDemo() {
            document.getElementById('loading').style.display = 'none';
            const wrapper = document.getElementById('newsWrapper');
            wrapper.innerHTML = `
                <div class="news-card">
                    <img src="${defaultCodImg}" class="news-image">
                    <div class="news-content">
                        <div class="news-meta"><span>CALL OF DUTY 🔴</span><span>LIVE</span></div>
                        <h3 id="title-demo">Call of Duty Mobile New Season Update: Weapon Meta Shifts and Balancing Changes</h3>
                        <p id="desc-demo">The latest update introduces heavy duty weapon optimizations, brand new operational battle pass maps, and performance patches for multiplayer ranks.</p>
                        <button class="translate-btn" onclick="translateNews('demo')">ترجمه به فارسی 🔄</button>
                        <div class="translated-box" id="trans-box-demo"></div>
                    </div>
                </div>
            `;
        }

        window.addEventListener('DOMContentLoaded', loadLiveNews);
    </script>
</body>
</html>
