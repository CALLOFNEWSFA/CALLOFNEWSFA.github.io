<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CODM News Pro</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b0b0b;
  color:#fff;
}

.header{
  text-align:center;
  padding:20px;
  font-size:26px;
  color:#00ffcc;
  font-weight:bold;
}

/* 🔍 سرچ */
.search-box{
  text-align:center;
  margin:10px;
}
.search-box input{
  width:80%;
  padding:10px;
  border-radius:10px;
  border:none;
  font-size:14px;
}

/* 📰 گرید */
#newsWrapper{
  max-width:1000px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:15px;
  padding:10px;
}

/* کارت */
.card{
  background:#111;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 0 15px rgba(0,255,200,0.2);
  transition:0.3s;
}
.card:hover{
  transform:translateY(-5px) scale(1.02);
}

.card img{
  width:100%;
  height:170px;
  object-fit:cover;
}

.content{
  padding:15px;
}

.title{
  font-size:16px;
  margin-bottom:8px;
}

.desc{
  font-size:13px;
  color:#aaa;
  margin-bottom:10px;
  max-height:120px;
  overflow:auto;
}

.meta{
  font-size:12px;
  color:#00ffcc;
  margin-bottom:10px;
}

.loading{
  text-align:center;
  margin-top:50px;
}
</style>
</head>

<body>

<div class="header">🔥 اخبار Call of Duty Mobile</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="🔍 جستجو در اخبار...">
</div>

<div id="newsWrapper">
  <div class="loading">در حال دریافت اخبار...</div>
</div>

<script>
const sources = [
  "https://api.rss2json.com/v1/api.json?rss_url=https://www.callofduty.com/blog/rss",
  "https://api.rss2json.com/v1/api.json?rss_url=https://dotesports.com/call-of-duty/feed",
  "https://api.rss2json.com/v1/api.json?rss_url=https://www.sportskeeda.com/esports/call-of-duty-mobile/rss"
];

let allNews = [];

// 📅 تاریخ
function formatDate(date){
  const d = new Date(date);
  return d.getFullYear()+"/"+
         String(d.getMonth()+1).padStart(2,'0')+"/"+
         String(d.getDate()).padStart(2,'0')+" "+
         String(d.getHours()).padStart(2,'0')+":"+
         String(d.getMinutes()).padStart(2,'0');
}

// 📰 رندر
function renderNews(list){
  const wrapper = document.getElementById("newsWrapper");
  wrapper.innerHTML = "";

  if(list.length === 0){
    wrapper.innerHTML="<div class='loading'>چیزی پیدا نشد 😐</div>";
    return;
  }

  list.forEach(item=>{

    let img = item.thumbnail || item.enclosure?.link || "";

    if(!img){
      const m = item.description?.match(/<img[^>]+src="([^">]+)"/);
      if(m) img = m[1];
    }

    const text = (item.description||"").replace(/<[^>]*>/g,"");

    const card = `
      <div class="card">
        ${img ? `<img src="${img}" onerror="this.style.display='none'">` : ""}
        <div class="content">
          <div class="meta">📅 ${formatDate(item.pubDate)}</div>
          <div class="title">${item.title}</div>
          <div class="desc">${text}</div>
          <a href="${item.link}" target="_blank" style="color:#00ffcc">مشاهده کامل</a>
        </div>
      </div>
    `;

    wrapper.innerHTML += card;
  });
}

// 🔥 لود اخبار
async function loadNews(){
  const wrapper = document.getElementById("newsWrapper");

  try{
    const results = await Promise.all(
      sources.map(u=>fetch(u).then(r=>r.json()).catch(()=>({items:[]})))
    );

    let items=[];
    results.forEach(r=>{ if(r.items) items=items.concat(r.items); });

    // 💣 فیلتر CODM
    const keywords = [
      "call of duty mobile","codm","cod mobile",
      "mobile season","mobile update","warzone mobile"
    ];

    items = items.filter(i=>{
      const t = ((i.title||"")+(i.description||"")).toLowerCase();
      return keywords.some(k=>t.includes(k));
    });

    // حذف تکراری
    const seen=new Set();
    items = items.filter(i=>{
      if(seen.has(i.title)) return false;
      seen.add(i.title);
      return true;
    });

    // مرتب سازی
    items.sort((a,b)=> new Date(b.pubDate)-new Date(a.pubDate));

    // 🔥 ذخیره برای سرچ
    allNews = items;

    // نمایش
    renderNews(items.slice(0,30));

  }catch(e){
    wrapper.innerHTML="<div class='loading'>خطا 😡</div>";
  }
}

// 🔍 سرچ لحظه‌ای
document.addEventListener("input", function(e){
  if(e.target.id === "searchInput"){
    const value = e.target.value.toLowerCase();

    const filtered = allNews.filter(item=>{
      const t = ((item.title||"")+(item.description||"")).toLowerCase();
      return t.includes(value);
    });

    renderNews(filtered);
  }
});

document.addEventListener("DOMContentLoaded", loadNews);
</script>

</body>
</html>
