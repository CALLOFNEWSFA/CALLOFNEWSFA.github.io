<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gameplay</title>

<style>
body{
  margin:0;
  background:black;
  font-family:tahoma;
  overflow:hidden;
}

/* اسکرول */
.reels{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.reel{
  height:100vh;
  position:relative;
  scroll-snap-align:start;
}

video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* دکمه‌ها */
.controls{
  position:absolute;
  right:15px;
  bottom:100px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.btn{
  width:55px;
  height:55px;
  border-radius:50%;
  background:rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  color:white;
  backdrop-filter: blur(5px);
  transition:0.2s;
}

.btn:active{
  transform:scale(0.85);
}

/* لایک */
.like{
  flex-direction:column;
}

.like span{
  font-size:12px;
}

/* انیمیشن */
@keyframes pop {
  0%{transform:scale(1);}
  50%{transform:scale(1.6);}
  100%{transform:scale(1);}
}

.liked{
  color:red;
  animation:pop 0.3s;
}

/* قلب وسط */
.big-heart{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:100px;
  color:red;
  opacity:0.8;
  pointer-events:none;
}

@keyframes bigLike {
  0%{transform:translate(-50%,-50%) scale(0);opacity:0;}
  50%{transform:translate(-50%,-50%) scale(1.3);opacity:1;}
  100%{transform:translate(-50%,-50%) scale(0);opacity:0;}
}

/* بک */
.back{
  position:fixed;
  top:10px;
  left:10px;
  background:red;
  color:white;
  padding:10px;
  border-radius:10px;
  z-index:999;
}

/* کامنت */
.comment-box{
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  height:60%;
  background:#111;
  border-top:2px solid red;
  transition:0.3s;
  z-index:999;
  display:flex;
  flex-direction:column;
}

.comment-box.active{
  bottom:0;
}

.comment-header{
  padding:10px;
  text-align:center;
  color:white;
  border-bottom:1px solid #333;
}

.comment-list{
  flex:1;
  overflow-y:auto;
  padding:10px;
  color:white;
}

.comment{
  background:#222;
  padding:8px;
  margin-bottom:8px;
  border-radius:8px;
}

.comment-input{
  display:flex;
}

.comment-input input{
  flex:1;
  padding:10px;
  background:black;
  color:white;
  border:none;
}

.comment-input button{
  background:red;
  color:white;
  border:none;
  padding:10px;
}

/* لاگین */
#loginBox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
</style>
</head>

<body>

<div class="back" onclick="goBack()">⬅</div>

<!-- لاگین -->
<div id="loginBox">
  <div style="color:white;text-align:center">
    <h2>نام کاربری</h2>
    <input id="usernameInput">
    <br><br>
    <button onclick="saveUser()">ثبت</button>
  </div>
</div>

<div class="reels" id="reels"></div>

<!-- کامنت -->
<div id="commentBox" class="comment-box">
  <div class="comment-header">💬 کامنت‌ها</div>
  <div id="commentList" class="comment-list"></div>
  <div class="comment-input">
    <input id="commentInput">
    <button onclick="sendComment()">ارسال</button>
  </div>
</div>

<script>

let username = localStorage.getItem("username");
if(username){
  document.getElementById("loginBox").style.display="none";
}

function saveUser(){
  let val = document.getElementById("usernameInput").value;
  if(!val) return;
  localStorage.setItem("username", val);
  location.reload();
}

const container = document.getElementById("reels");
let loaded=0;

function createReel(src){

  let div=document.createElement("div");
  div.className="reel";

  div.innerHTML=`
  <video src="${src}" loop muted playsinline ondblclick="dblLike(this)"></video>
  <div class="big-heart">❤️</div>

  <div class="controls">
    <div class="btn" onclick="toggleSound(this)">🔇</div>
    <div class="btn" onclick="openComments(this)">💬</div>
    <div class="btn like" onclick="like(this)">
      ❤️ <span>0</span>
    </div>
  </div>
  `;

  container.appendChild(div);

  if(localStorage.getItem(src)){
    div.querySelector(".like").classList.add("liked");
  }
}

function loadMore(){
  for(let i=0;i<6;i++){
    loaded++;
    createReel("video"+loaded+".mp4");
  }
  observe();
}

loadMore();

container.addEventListener("scroll",()=>{
  if(container.scrollTop+container.clientHeight>=container.scrollHeight-200){
    loadMore();
  }
});

function like(el){
  let reel=el.closest(".reel");
  let video=reel.querySelector("video");
  let src=video.src;
  let span=el.querySelector("span");

  if(localStorage.getItem(src)){
    localStorage.removeItem(src);
    el.classList.remove("liked");
    span.innerText=Math.max(0,parseInt(span.innerText)-1);
  }else{
    localStorage.setItem(src,"1");
    el.classList.add("liked");
    span.innerText=parseInt(span.innerText)+1;

    let big=reel.querySelector(".big-heart");
    big.style.animation="bigLike 0.6s";
    setTimeout(()=>big.style.animation="",600);
  }
}

function dblLike(v){
  let btn=v.closest(".reel").querySelector(".like");
  like(btn);
}

function toggleSound(btn){
  let v=btn.closest(".reel").querySelector("video");
  if(v.muted){v.muted=false;btn.innerText="🔊";v.play();}
  else{v.muted=true;btn.innerText="🔇";}
}

function observe(){
  const o=new IntersectionObserver(e=>{
    e.forEach(x=>{
      if(x.isIntersecting)x.target.play();
      else x.target.pause();
    });
  },{threshold:0.6});

  document.querySelectorAll("video").forEach(v=>o.observe(v));
}

/* کامنت */
let currentVideo="";

function openComments(btn){
  let reel=btn.closest(".reel");
  currentVideo=reel.querySelector("video").src;
  document.getElementById("commentBox").classList.add("active");
  loadComments();
}

function sendComment(){
  let txt=document.getElementById("commentInput").value;
  if(!txt)return;

  let arr=JSON.parse(localStorage.getItem(currentVideo)||"[]");
  arr.push({user:localStorage.getItem("username"),text:txt});
  localStorage.setItem(currentVideo,JSON.stringify(arr));

  document.getElementById("commentInput").value="";
  loadComments();
}

function loadComments(){
  let list=document.getElementById("commentList");
  list.innerHTML="";
  let arr=JSON.parse(localStorage.getItem(currentVideo)||"[]");

  arr.reverse().forEach(c=>{
    let d=document.createElement("div");
    d.className="comment";
    d.innerHTML=`<b style="color:red">${c.user}</b><br>${c.text}`;
    list.appendChild(d);
  });
}

function goBack(){
  window.location.href="index.html";
}

</script>

</body>
</html>
