<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call of News</title>

<link rel="preload" as="image" href="1.jpg">
<link rel="preload" as="image" href="2.jpg">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Vazirmatn', sans-serif;
  background:#000;
  overflow:hidden;
  color:white;
}

/* لودینگ */
.loader{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Orbitron';
  font-size:18px;
  color:red;
  z-index:999;
  animation:fadeOut 1s ease forwards;
  animation-delay:1.5s;
}

@keyframes fadeOut{
  to{opacity:0;visibility:hidden;}
}

/* عنوان */
.title{
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  font-size:28px;
  color:#ff1a1a;
  text-shadow:0 0 12px red;
  z-index:10;
}

/* کانتینر */
.container{
  display:flex;
  height:100vh;
  position:relative;
}

/* باکس */
.box{
  flex:1;
  overflow:hidden;
  cursor:pointer;
  position:relative;
}

/* 🔥 تصویر با بلِند */
.box img{
  width:100%;
  height:100%;
  object-fit:cover;
  mix-blend-mode:screen;
  filter:brightness(0.7);
  opacity:0;
  transform:scale(1.05);
  transition:1s ease;
}

.box img.loaded{
  opacity:1;
  transform:scale(1);
}

.box:hover img{
  transform:scale(1.08);
  filter:brightness(1);
}

/* 🔥 بلِند وسط حرفه‌ای */
.container::before{
  content:'';
  position:absolute;
  left:50%;
  top:0;
  transform:translateX(-50%);
  width:400px;
  height:100%;
  z-index:3;
  pointer-events:none;
  background:radial-gradient(circle,rgba(0,0,0,0) 0%,rgba(0,0,0,0.3) 40%,rgba(0,0,0,0.8) 80%,black 100%);
}

/* نور وسط */
.center-glow{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:350px;
  height:350px;
  background:radial-gradient(circle,rgba(255,0,0,0.25),transparent 70%);
  z-index:2;
  pointer-events:none;
  animation:pulse 3s infinite;
}

@keyframes pulse{
  0%,100%{opacity:0.4;}
  50%{opacity:0.9;}
}

/* دکمه */
.download{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-family:'Orbitron';
  padding:8px 25px;
  font-size:13px;
  background:linear-gradient(45deg,#ff0000,#ff4d4d);
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
  z-index:5;
  box-shadow:0 0 15px red;
  transition:0.3s;
}

.download:hover{
  transform:translate(-50%,-50%) scale(1.1);
  box-shadow:0 0 30px red;
}

/* نور موس */
.cursor{
  position:fixed;
  width:120px;
  height:120px;
  background:radial-gradient(circle,rgba(255,0,0,0.35),transparent 70%);
  pointer-events:none;
  border-radius:50%;
  transform:translate(-50%,-50%);
  z-index:1;
}

/* 🔥 آتش */
.fire{
  position:absolute;
  top:-10px;
  width:6px;
  height:6px;
  background:orange;
  border-radius:50%;
  opacity:0.7;
  filter:blur(1px);
  animation:fall linear infinite;
}

@keyframes fall{
  to{
    transform:translateY(110vh);
    opacity:0;
  }
}

/* موبایل */
@media(max-width:768px){
  .container{flex-direction:column;}
  .title{font-size:20px;}
}
</style>
</head>

<body>

<div class="loader">LOADING...</div>
<div class="cursor" id="cursor"></div>

<div class="title">چنل بزرگ کالاف نیوز</div>

<div class="container">

  <div class="box" onclick="go('attachments.html')">
    <img src="1.jpg" loading="lazy">
  </div>

  <div class="box" onclick="go('news.html')">
    <img src="2.jpg" loading="lazy">
  </div>

  <div class="center-glow"></div>

</div>

<button class="download" onclick="downloadGame()">DOWNLOAD</button>

<audio id="clickSound" src="https://www.soundjay.com/buttons/button-16.mp3"></audio>

<script>

/* ناوبری */
function go(p){
  playSound();
  setTimeout(()=>window.location.href=p,150);
}

function downloadGame(){
  playSound();
  setTimeout(()=>{
    window.location.href="https://www.callofduty.com/mobile";
  },150);
}

/* صدا */
function playSound(){
  const s=document.getElementById("clickSound");
  s.currentTime=0;
  s.play();
}

/* لود نرم */
document.querySelectorAll("img").forEach(img=>{
  if(img.complete){
    img.classList.add("loaded");
  }else{
    img.onload=()=>img.classList.add("loaded");
  }
});

/* نور موس */
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
});

/* 🔥 آتش بهینه */
function fire(){
  const f=document.createElement("div");
  f.className="fire";
  f.style.left=Math.random()*window.innerWidth+"px";
  f.style.animationDuration=(Math.random()*3+2)+"s";
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),5000);
}

function loop(){
  if(document.hidden) return;
  fire();
  setTimeout(loop,120);
}
loop();

</script>

</body>
</html>
