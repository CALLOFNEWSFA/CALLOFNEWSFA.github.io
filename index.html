<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CALL OF NEWS</title>

<style>
body{
  margin:0;
  background:black;
  color:#00ff9f;
  font-family:monospace;
  overflow:hidden;
}

/* لودینگ */
#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#loaderText{
  font-size:18px;
  margin-bottom:20px;
}

#progress{
  width:200px;
  height:10px;
  border:1px solid #00ff9f;
}

#bar{
  height:100%;
  width:0%;
  background:#00ff9f;
}

/* سایت */
#main{
  display:none;
}

/* ماتریکس */
canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* هدر */
.header{
  text-align:center;
  margin-top:40px;
  font-size:22px;
  text-shadow:0 0 10px #00ff9f;
  animation:glitch 1s infinite;
}

@keyframes glitch{
  0%{text-shadow:2px 0 red;}
  50%{text-shadow:-2px 0 blue;}
  100%{text-shadow:2px 0 red;}
}

/* باکس */
.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  flex-direction:column;
  gap:20px;
  width:80%;
  max-width:300px;
}

.box{
  border:1px solid #00ff9f;
  padding:15px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 0 10px #00ff9f;
}

.box:hover{
  background:#001a12;
  transform:scale(1.05);
}

.footer{
  position:absolute;
  bottom:10px;
  width:100%;
  text-align:center;
  font-size:14px;
  opacity:0.7;
}
</style>
</head>

<body>

<!-- لودینگ -->
<div id="loader">
  <div id="loaderText">Initializing...</div>
  <div id="progress"><div id="bar"></div></div>
</div>

<!-- سایت -->
<div id="main">

<canvas id="matrix"></canvas>

<div class="header">☠ ACCESS: CALL OF NEWS ☠</div>

<div class="container">
  <div class="box" onclick="window.open('https://ble.ir/call_of_news_fa')">▶ ورود به کانال</div>
  <div class="box" onclick="location.href='attachments.html'">▶ اتچمنت‌ها</div>
  <div class="box" onclick="location.href='news.html'">▶ اخبار کالاف</div>
</div>

<div class="footer">CHANNEL: CALL OF NEWS</div>

</div>

<script>
// 🔥 لودینگ هکری
let percent=0;
let text=document.getElementById("loaderText");
let bar=document.getElementById("bar");

let messages=[
  "Connecting to server...",
  "Bypassing security...",
  "Decrypting files...",
  "Access granted...",
  "Loading system..."
];

let i=0;

let load=setInterval(()=>{
  percent++;
  bar.style.width=percent+"%";

  if(percent%20==0 && i<messages.length){
    text.innerText=messages[i];
    i++;
  }

  if(percent>=100){
    clearInterval(load);
    document.getElementById("loader").style.display="none";
    document.getElementById("main").style.display="block";
  }

},30);

// MATRIX
let canvas=document.getElementById("matrix");
let ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

let letters="01".split("");
let fontSize=14;
let columns=canvas.width/fontSize;
let drops=[];

for(let x=0;x<columns;x++) drops[x]=1;

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#00ff9f";
  ctx.font=fontSize+"px monospace";

  for(let i=0;i<drops.length;i++){
    let text=letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*fontSize,drops[i]*fontSize);

    if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
      drops[i]=0;

    drops[i]++;
  }
}

setInterval(draw,33);
</script>

</body>
</html>
