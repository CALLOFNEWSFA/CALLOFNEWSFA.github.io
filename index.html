<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call of News</title>

<link rel="preload" as="image" href="1.jpg">
<link rel="preload" as="image" href="2.jpg">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Vazirmatn', sans-serif;
  background:#000;
  height:100vh;
  overflow:hidden;
  color:white;
}

/* 🔥 لودینگ */
.loader{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  font-family:'Orbitron';
  color:#0f0;
  font-size:20px;
  letter-spacing:3px;
}

/* عنوان */
.title{
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  font-size:30px;
  color:red;
  text-shadow:0 0 10px red;
  z-index:10;
}

/* کانتینر */
.container{
  display:flex;
  height:100vh;
}

/* باکس */
.box{
  flex:1;
  position:relative;
  overflow:hidden;
  cursor:pointer;
}

/* تصویر */
.box img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:blur(15px) brightness(0.4);
  transform:scale(1.1);
  opacity:0;
  transition:1s;
}

.box img.loaded{
  filter:blur(0) brightness(1);
  transform:scale(1);
  opacity:1;
}

.box:hover img{
  transform:scale(1.08);
  filter:brightness(1.2);
}

/* بلِند */
.container::before,
.container::after{
  content:'';
  position:absolute;
  top:0;
  width:200px;
  height:100%;
  z-index:3;
}

.container::before{
  left:50%;
  transform:translateX(-100%);
  background:linear-gradient(to right,black,transparent);
}

.container::after{
  left:50%;
  background:linear-gradient(to left,black,transparent);
}

/* دکمه */
.download{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-family:'Orbitron';
  padding:10px 30px;
  font-size:14px;
  background:red;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
  z-index:5;
  box-shadow:0 0 15px red;
  transition:0.3s;
}

.download:hover{
  transform:translate(-50%,-50%) scale(1.1);
}

/* 🔥 نور موس */
.cursor{
  position:fixed;
  width:120px;
  height:120px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,0,0,0.4), transparent);
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:999;
}

/* آتش */
.fire{
  position:absolute;
  top:-10px;
  width:6px;
  height:6px;
  background:orange;
  border-radius:50%;
  opacity:0.8;
  animation:fall linear infinite;
}

@keyframes fall{
  to{
    transform:translateY(110vh);
    opacity:0;
  }
}

@media(max-width:768px){
  .container{flex-direction:column;}
  .title{font-size:22px;}
}
</style>
</head>

<body>

<div class="loader">LOADING...</div>
<div class="cursor"></div>

<div class="title">چنل بزرگ کالاف نیوز</div>

<div class="container">
  <div class="box" onclick="go('attachments.html')">
    <img src="1.jpg">
  </div>

  <div class="box" onclick="go('news.html')">
    <img src="2.jpg">
  </div>
</div>

<button class="download" onclick="downloadGame()">DOWNLOAD</button>

<!-- 🔊 صدا -->
<audio id="clickSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c5c8c8c8.mp3"></audio>

<script>

/* لودینگ */
window.onload = ()=>{
  setTimeout(()=>{
    document.querySelector(".loader").style.display="none";
  },1500);
};

/* رفتن */
function go(p){
  playSound();
  setTimeout(()=>{window.location.href=p},200);
}

/* دانلود */
function downloadGame(){
  playSound();
  setTimeout(()=>{
    window.location.href="https://www.callofduty.com/mobile";
  },200);
}

/* صدا */
function playSound(){
  document.getElementById("clickSound").play();
}

/* لود نرم */
document.querySelectorAll("img").forEach(img=>{
  img.onload = ()=> img.classList.add("loaded");
});

/* نور موس */
document.addEventListener("mousemove", e=>{
  const c=document.querySelector(".cursor");
  c.style.left=e.clientX+"px";
  c.style.top=e.clientY+"px";
});

/* آتش */
function fire(){
  const f=document.createElement("div");
  f.className="fire";
  f.style.left=Math.random()*window.innerWidth+"px";
  f.style.animationDuration=(Math.random()*3+2)+"s";
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),5000);
}
setInterval(fire,60);

</script>

</body>
</html>
