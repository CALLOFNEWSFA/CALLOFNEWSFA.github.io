<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call Of News</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:tahoma;
}

body{
    background:#000;
    color:#fff;
    text-align:center;
    overflow:hidden;
}

/* پس زمینه متحرک */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle,#ff000022,transparent 70%);
    animation: move 6s infinite alternate;
}
@keyframes move{
    from{transform:scale(1);}
    to{transform:scale(1.5);}
}

/* کانتینر */
.container{
    position:relative;
    z-index:2;
    padding:40px 20px;
}

/* تیتر */
.title{
    font-size:45px;
    color:#ff0000;
    text-shadow:0 0 25px red,0 0 50px red;
    animation: glow 1.5s infinite alternate;
}
@keyframes glow{
    from{text-shadow:0 0 10px red;}
    to{text-shadow:0 0 40px #ff0000;}
}

/* توضیح */
.desc{
    margin-top:15px;
    opacity:0.8;
}

/* دکمه */
.btn{
    display:inline-block;
    margin:15px;
    padding:15px 30px;
    background:linear-gradient(45deg,#ff0000,#660000);
    border-radius:12px;
    text-decoration:none;
    color:#fff;
    font-size:18px;
    box-shadow:0 0 15px red;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 30px red;
}

/* کارت ها */
.cards{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    margin-top:40px;
}

.card{
    width:250px;
    margin:10px;
    padding:20px;
    background:#111;
    border:1px solid red;
    border-radius:15px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px) scale(1.05);
    box-shadow:0 0 25px red;
}

/* موزیک */
.music-btn{
    position:fixed;
    bottom:20px;
    left:20px;
    background:red;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    color:#fff;
    cursor:pointer;
    box-shadow:0 0 15px red;
}

/* ریسپانسیو */
@media(max-width:600px){
    .title{font-size:28px;}
    .card{width:90%;}
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<h1 class="title">🔥 چنل بزرگ کالاف نیوز 🔥</h1>
<p class="desc">اخبار، لیک‌ها و آموزش‌های خفن کالاف</p>

<a class="btn" href="https://ble.ir/call_of_news_fa">ورود به کانال</a>
<a class="btn" href="https://esfahanclient.github.io">بزن روم 😈</a>

<div class="cards">
<div class="card">📢 اخبار جدید کالاف</div>
<div class="card">🎮 آموزش حرفه‌ای</div>
<div class="card">🔥 لیک‌های مخفی</div>
</div>

</div>

<!-- موزیک -->
<audio id="bgmusic" loop>
    <source src="https://cdn.pixabay.com/audio/2023/03/14/audio_4f2c5bb3b2.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()">🔊 موزیک</button>

<script>
let music = document.getElementById("bgmusic");

function toggleMusic(){
    if(music.paused){
        music.play();
    } else {
        music.pause();
    }
}
</script>

</body>
</html>
