<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call Of News</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(135deg, #000000, #1a0000);
  color: white;
  text-align: center;
}

/* هدر */
.header {
  padding: 20px;
  font-size: 26px;
  font-weight: bold;
  color: red;
}

/* باکس ها */
.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

.box {
  width: 250px;
  height: 120px;
  background: #111;
  border: 2px solid red;
  border-radius: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  cursor: pointer;
  transition: 0.3s;
}

.box:hover {
  background: red;
  transform: scale(1.05);
}

/* دکمه کانال */
.channel-btn {
  display: inline-block;
  margin: 20px;
  padding: 15px 25px;
  background: red;
  color: white;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
}

/* فوتر */
.footer {
  margin-top: 40px;
  padding: 15px;
  color: gray;
}

/* صفحه ویدیو (ریلز) */
#reelsPage {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background: black;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  z-index: 999;
}

.reel {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  scroll-snap-align: start;
}

.reel video {
  height: 100%;
  width: 100%;
  object-fit: cover;
}

/* لایک */
.like-btn {
  position: absolute;
  right: 20px;
  bottom: 80px;
  font-size: 24px;
  background: rgba(0,0,0,0.5);
  padding: 10px 15px;
  border-radius: 50px;
  cursor: pointer;
}

.like-btn.liked {
  color: red;
}

/* دکمه بستن */
.close-btn {
  position: fixed;
  top: 20px;
  left: 20px;
  background: red;
  padding: 10px 15px;
  border-radius: 10px;
  cursor: pointer;
  z-index: 1000;
}
</style>

</head>
<body>

<div class="header">چنل بزرگ کالاف نیوز</div>

<div class="container">
  <div class="box">اخبار جدید کالاف</div>
  <div class="box">اتچمنت های کالاف</div>
  <div class="box" onclick="openReels()">گیم پلی های خفن</div>
</div>

<a class="channel-btn" href="https://ble.ir/call_of_news_fa">ورود به کانال</a>

<div class="footer">Call Of News</div>

<!-- صفحه گیم پلی -->
<div id="reelsPage">

  <div class="close-btn" onclick="closeReels()">بستن</div>

  <!-- ویدیو 1 -->
  <div class="reel">
    <video src="video7.mp4" autoplay muted loop></video>
    <div class="like-btn" onclick="like(this)">❤️ <span>0</span></div>
  </div>

  <!-- بعدا اینجا ویدیو اضافه کن -->
  <!--
  <div class="reel">
    <video src="video8.mp4" autoplay muted loop></video>
    <div class="like-btn" onclick="like(this)">❤️ <span>0</span></div>
  </div>
  -->

</div>

<script>
function openReels(){
  document.getElementById("reelsPage").style.display = "block";
}

function closeReels(){
  document.getElementById("reelsPage").style.display = "none";
}

function like(btn){
  let span = btn.querySelector("span");
  let count = parseInt(span.innerText);

  if(btn.classList.contains("liked")){
    btn.classList.remove("liked");
    span.innerText = count - 1;
  } else {
    btn.classList.add("liked");
    span.innerText = count + 1;
  }
}
</script>

</body>
</html>
