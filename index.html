<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call of News</title>

<link rel="preload" as="image" href="/1.jpg">
<link rel="preload" as="image" href="/2.jpg">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#000;
  overflow:hidden;
  font-family:'Vazirmatn';
  color:#fff;
}

/* لودینگ */
.loader{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Orbitron';
  color:red;
  font-size:20px;
  z-index:999;
  animation:fadeOut 1s forwards;
  animation-delay:2s;
}
@keyframes fadeOut{
  to{opacity:0;visibility:hidden;}
}

/* عنوان */
.title{
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  color:#ff1a1a;
  font-size:28px;
  text-shadow:0 0 20px red;
  z-index:10;
}

/* کانتینر */
.container{
  display:flex;
  height:100vh;
  position:relative;
}

/* باکس */
.box{
  flex:1;
  position:relative;
  overflow:hidden;
}

/* تصویر */
.box img{
  width:115%;
  height:115%;
  object-fit:cover;
  position:absolute;
  top:-7%;
  left:-7%;
  filter:brightness(0.7) contrast(1.1);
  transition:0.6s;
}

/* عمق */
.left img{ transform:translateX(-60px) scale(1.1);}
.right img{ transform:translateX(60px) scale(1.1);}

/* هاور */
.box:hover img{
  transform:translateX(0) scale(1.15);
  filter:brightness(1.2);
}

/* محو وسط */
.container::before{
  content:'';
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:500px;
  height:100%;
  background:linear-gradient(to right,black,transparent,black);
  z-index:5;
}

/* نور */
.center-glow{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:400px;
  height:400px;
  background:radial-gradient(circle,rgba(255,0,0,0.4),transparent);
  z-index:6;
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%,100%{opacity:0.4;}
  50%{opacity:1;}
}

/* دکمه */
.download{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  padding:10px 30px;
  background:red;
  border:none;
  color:white;
  font-family:'Orbitron';
  border-radius:8px;
  box-shadow:0 0 20px red;
  z-index:10;
  cursor:pointer;
}

/* نور موس */
.cursor{
  position:fixed;
  width:150px;
  height:150px;
  background:radial-gradient(circle,rgba(255,0,0,0.3),transparent);
  border-radius:50%;
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:2;
}

/* 🔥 آتش */
.fire{
  position:absolute;
  width:6px;
  height:6px;
  background:orange;
  border-radius:50%;
  opacity:0.7;
  animation:fall linear;
}
@keyframes fall{
  to{transform:translateY(110vh);opacity:0;}
}

/* 💨 دود */
.smoke{
  position:absolute;
  width:20px;
  height:20px;
  background:rgba(255,255,255,0.1);
  border-radius:50%;
  filter:blur(8px);
  animation:smokeUp linear;
}
@keyframes smokeUp{
  to{transform:translateY(-200px);opacity:0;}
}

@media(max-width:768px){
  .container{flex-direction:column;}
}
</style>
</head>

<body>

<div class="loader">LOADING...</div>
<div class="cursor" id="cursor"></div>

<div class="title">چنل بزرگ کالاف نیوز</div>

<div class="container">

  <div class="box left">
    <img src="/1.jpg">
  </div>

  <div class="box right">
    <img src="/2.jpg">
  </div>

  <div class="center-glow"></div>

</div>

<button class="download" onclick="go()">DOWNLOAD</button>

<audio id="click" src="https://www.soundjay.com/buttons/button-16.mp3"></audio>

<script>

/* کلیک */
function go(){
  play();
  setTimeout(()=>{
    window.location.href="https://www.callofduty.com/mobile";
  },150);
}

/* صدا */
function play(){
  let a=document.getElementById("click");
  a.currentTime=0;
  a.play();
}

/* پارالاکس */
document.addEventListener("mousemove",e=>{
  let x=(e.clientX/window.innerWidth-0.5)*40;
  document.querySelector(".left img").style.transform=`translateX(${x-60}px) scale(1.1)`;
  document.querySelector(".right img").style.transform=`translateX(${x+60}px) scale(1.1)`;
});

/* نور موس */
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
});

/* 🔥 آتش */
function fire(){
  let f=document.createElement("div");
  f.className="fire";
  f.style.left=Math.random()*window.innerWidth+"px";
  f.style.animationDuration=(Math.random()*3+2)+"s";
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),4000);
}

/* 💨 دود */
function smoke(){
  let s=document.createElement("div");
  s.className="smoke";
  s.style.left=(window.innerWidth/2 + (Math.random()*200-100))+"px";
  s.style.bottom="0px";
  s.style.animationDuration=(Math.random()*4+3)+"s";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),5000);
}

/* لوپ سبک */
function loop(){
  if(!document.hidden){
    fire();
    if(Math.random()>0.5) smoke();
  }
  setTimeout(loop,120);
}
loop();

</script>

</body>
</html>
