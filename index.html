<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call Of News</title>

<style>
body{
  margin:0;
  font-family:tahoma;
  background:black;
  color:white;
}

/* هدر */
.header{
  text-align:center;
  padding:20px;
  font-size:22px;
  color:red;
  font-weight:bold;
  border-bottom:1px solid red;
}

/* دکمه ورود */
.join{
  display:block;
  margin:20px auto;
  width:200px;
  text-align:center;
  padding:12px;
  background:red;
  color:white;
  text-decoration:none;
  border-radius:10px;
}

/* باکس‌ها */
.boxes{
  display:flex;
  gap:10px;
  padding:10px;
}
.box{
  flex:1;
  background:#111;
  padding:15px;
  text-align:center;
  border-radius:10px;
}

/* خبر */
.news{
  padding:15px;
  border-top:1px solid red;
}

/* ویدیو */
.reels{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}
.reel{
  height:100vh;
  position:relative;
  scroll-snap-align:start;
}
video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* دکمه‌ها */
.like{
  position:absolute;
  right:20px;
  bottom:100px;
  font-size:20px;
}
.sound{
  position:absolute;
  left:20px;
  bottom:100px;
  font-size:20px;
}

.footer{
  text-align:center;
  padding:15px;
  border-top:1px solid red;
  color:red;
}
</style>

</head>
<body>

<div class="header">
چنل بزرگ کالاف نیوز
</div>

<a class="join" href="https://ble.ir/call_of_news_fa">
ورود به کانال
</a>

<div class="boxes">
  <div class="box">اخبار جدید کالاف</div>
  <div class="box">اتچمنت های کالاف</div>
  <div class="box">گیم پلی خفن</div>
</div>

<div class="news">
📢 سیزن ۶ سال ۲۰۲۶ به زودی (۱۰ تیر) میاد 🔥
</div>

<!-- ویدیوها -->
<div class="reels">

<div class="reel">
  <video id="v1" src="video7.mp4" autoplay muted loop></video>

  <div class="sound" onclick="sound('v1',this)">🔇</div>
  <div class="like" onclick="like(this)">❤️ <span>0</span></div>
</div>

<div class="reel">
  <video id="v2" src="video8.mp4" autoplay muted loop></video>

  <div class="sound" onclick="sound('v2',this)">🔇</div>
  <div class="like" onclick="like(this)">❤️ <span>0</span></div>
</div>

</div>

<div class="footer">
Call Of News Channel
</div>

<script>
function like(el){
  let num = el.querySelector("span");
  num.innerText = parseInt(num.innerText)+1;
}

function sound(id,btn){
  let v = document.getElementById(id);

  if(v.muted){
    v.muted=false;
    btn.innerText="🔊";
  }else{
    v.muted=true;
    btn.innerText="🔇";
  }
}
</script>

</body>
</html>
