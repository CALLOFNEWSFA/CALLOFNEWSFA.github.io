<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Callof Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:linear-gradient(to bottom,#1e3c72,#2a5298);
}

/* بکگراند تار */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.3);
  z-index:1;
}

/* کانتینر */
.container{
  display:flex;
  height:100vh;
  position:relative;
  z-index:2;
}

/* کارت‌ها */
.card{
  width:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  cursor:pointer;
  position:relative;
}

/* عکس */
.card img{
  width:100%;
  height:100%;
  object-fit:contain; /* مهم */
  background:black;
  transition:0.4s;
}

/* هاور */
.card:hover img{
  transform:scale(1.03);
  filter:brightness(1.1);
}

/* خط وسط محو */
.card::after{
  content:"";
  position:absolute;
  right:-1px;
  width:2px;
  height:100%;
  background:linear-gradient(to bottom, transparent, white, transparent);
  opacity:0.3;
}

/* دکمه دانلود */
.download{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  padding:15px 35px;
  background:rgba(255,255,255,0.1);
  border:2px solid white;
  color:white;
  font-size:18px;
  cursor:pointer;
  backdrop-filter:blur(10px);
  transition:0.3s;
  z-index:3;
}

.download:hover{
  background:white;
  color:black;
  box-shadow:0 0 20px white;
}

/* موبایل */
@media(max-width:768px){
  .container{
    flex-direction:column;
  }

  .card{
    width:100%;
    height:50%;
  }

  .card::after{
    display:none;
  }
}
</style>

</head>

<body>

<div class="overlay"></div>

<div class="container">

  <!-- عکس 1 -->
  <div class="card" onclick="go('attachments.html')">
    <img src="1.jpg">
  </div>

  <!-- عکس 2 -->
  <div class="card" onclick="go('news.html')">
    <img src="2.jpg">
  </div>

  <!-- دکمه دانلود -->
  <button class="download" onclick="downloadGame()">DOWNLOAD</button>

</div>

<script>
function go(page){
  window.location.href = page;
}

function downloadGame(){
  window.open("https://www.callofduty.com/mobile", "_blank");
}
</script>

</body>
</html>
