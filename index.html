<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Call Of Duty Hub</title>

<!-- فونت -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600&family=Vazirmatn&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#0b0f14;
  font-family:'Vazirmatn', sans-serif;
  overflow:hidden;
}

/* کانتینر */
.container{
  display:flex;
  height:100vh;
}

/* هر عکس */
.card{
  width:50%;
  position:relative;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(60%);
  transition:0.5s;
}

/* افکت هاور */
.card:hover img{
  filter:brightness(100%);
  transform:scale(1.05);
}

/* متن روی عکس */
.text{
  position:absolute;
  bottom:40px;
  left:40px;
  color:white;
  z-index:2;
}

.title{
  font-size:40px;
  font-family:'Orbitron';
  text-shadow:0 0 20px black;
}

.sub{
  font-family:'Rajdhani';
  opacity:0.8;
}

/* افکت وسط */
.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(to right, rgba(0,0,0,0.7), transparent, rgba(0,0,0,0.7));
  pointer-events:none;
}

/* انیمیشن ورود */
.card{
  animation:fadeIn 1s ease;
}

@keyframes fadeIn{
  from{
    opacity:0;
    transform:scale(0.9);
  }
  to{
    opacity:1;
    transform:scale(1);
  }
}

/* افکت گلیچ خفن */
.title{
  position:relative;
}

.title::after{
  content:attr(data-text);
  position:absolute;
  left:2px;
  top:0;
  color:red;
  opacity:0.3;
}
</style>

</head>

<body>

<div class="container">

  <!-- Attachments -->
  <div class="card" onclick="go('attachments.html')">
    <img src="1.jpg">
    <div class="text">
      <div class="title" data-text="اتچمنت ها">اتچمنت ها</div>
      <div class="sub">ATTACHMENTS</div>
    </div>
  </div>

  <!-- News -->
  <div class="card" onclick="go('news.html')">
    <img src="2.jpg">
    <div class="text">
      <div class="title" data-text="اخبار">اخبار</div>
      <div class="sub">NEWS</div>
    </div>
  </div>

</div>

<div class="overlay"></div>

<script>
function go(page){
  document.body.style.opacity = "0";
  setTimeout(()=>{
    window.location.href = page;
  },300);
}
</script>

</body>
</html>
