<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call Of News</title>

<style>
body{
  margin:0;
  font-family:tahoma;
  background:black;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

/* بکگراند گیمینگ */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle at center, #300 0%, black 70%);
  z-index:-1;
}

/* باکس اصلی */
.container{
  text-align:center;
}

/* عنوان */
.title{
  font-size:28px;
  margin-bottom:30px;
  color:red;
  text-shadow:0 0 15px red;
}

/* دکمه‌ها */
.btn{
  display:block;
  margin:10px auto;
  padding:15px 25px;
  width:250px;
  border-radius:12px;
  background:linear-gradient(45deg,#111,#300);
  border:1px solid red;
  color:white;
  font-size:16px;
  transition:0.2s;
  cursor:pointer;
}

.btn:hover{
  background:red;
  transform:scale(1.05);
}

/* فوتر */
.footer{
  margin-top:20px;
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="container">

  <div class="title">🔥 چنل بزرگ کالاف نیوز 🔥</div>

  <button class="btn" onclick="goGameplay()">🎮 گیم پلی های خفن</button>

  <button class="btn" onclick="goNews()">📰 اخبار کالاف</button>

  <button class="btn" onclick="openChannel()">🚀 ورود به کانال</button>

  <div class="footer">Call Of News</div>

</div>

<script>

function goGameplay(){
  window.location.href="gameplay.html";
}

function goNews(){
  alert("به زودی اخبار خفن میاد 😈🔥");
}

function openChannel(){
  window.location.href="https://ble.ir/call_of_news_fa";
}

</script>

</body>
</html>
