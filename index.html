<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call of News</title>

<!-- preload تصاویر -->
<link rel="preload" as="image" href="1.webp">
<link rel="preload" as="image" href="2.webp">

<!-- فونت -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Vazirmatn', sans-serif;
  background:linear-gradient(to bottom,#000,#111);
  height:100vh;
  overflow:hidden;
  color:white;
}

/* عنوان */
.title{
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  font-size:28px;
  color:red;
  z-index:10;
}

/* کانتینر */
.container{
  display:flex;
  height:100vh;
}

/* باکس */
.box{
  flex:1;
  position:relative;
  overflow:hidden;
  cursor:pointer;
}

/* تصویر */
.box img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:blur(10px) brightness(0.5);
  transition:0.6s;
}

/* بعد لود */
.box img.loaded{
  filter:blur(0) brightness(1);
}

/* هاور */
.box:hover img{
  transform:scale(1.05);
}

/* بلِند */
.box::after{
  content:'';
  position:absolute;
  top:0;
  width:120px;
  height:100%;
  z-index:2;
}

.box:first-child::after{
  right:-60px;
  background:linear-gradient(to right, transparent, black);
}

.box:last-child::after{
  left:-60px;
  background:linear-gradient(to left, transparent, black);
}

/* دکمه */
.download{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-family:'Orbitron', sans-serif;
  padding:10px 25px;
  font-size:14px;
  background:red;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
  z-index:5;
}

.download:hover{
  background:#ff2a2a;
  transform:translate(-50%,-50%) scale(1.1);
}

/* آتش */
.fire{
  position:absolute;
  top:-10px;
  width:6px;
  height:6px;
  background:orange;
  border-radius:50%;
  opacity:0.8;
  animation:fall linear infinite;
}

@keyframes fall{
  to{
    transform:translateY(110vh);
    opacity:0;
  }
}

/* موبایل */
@media(max-width:768px){
  .container{flex-direction:column;}
  .box::after{display:none;}
  .title{font-size:20px;}
}
</style>
</head>

<body>

<div class="title">چنل بزرگ کالاف نیوز</div>

<div class="container">

  <div class="box" onclick="go('attachments.html')">
    <img src="1.webp" alt="">
  </div>

  <div class="box" onclick="go('news.html')">
    <img src="2.webp" alt="">
  </div>

</div>

<button class="download" onclick="downloadGame()">DOWNLOAD</button>

<script>

/* رفتن صفحه */
function go(p){
  window.location.href = p;
}

/* دانلود */
function downloadGame(){
  window.location.href="https://www.callofduty.com/mobile";
}

/* blur load */
document.querySelectorAll("img").forEach(img=>{
  img.onload = ()=> img.classList.add("loaded");
});

/* آتش */
function fire(){
  const f=document.createElement("div");
  f.className="fire";
  f.style.left=Math.random()*window.innerWidth+"px";
  f.style.animationDuration=(Math.random()*3+2)+"s";
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),5000);
}
setInterval(fire,80);

</script>

</body>
</html>
